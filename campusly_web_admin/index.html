<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campusly Admin Control Center</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;900&family=Inter:wght@400;500;600&family=Bricolage+Grotesque:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "on-tertiary": "#ffffff",
              "outline-variant": "#c6c6cd",
              "surface-container-low": "#eff4ff",
              "on-surface": "#0d1c2f",
              "on-tertiary-fixed": "#191c1e",
              "primary-container": "#131b2e",
              "surface-dim": "#ccdbf4",
              "on-secondary": "#ffffff",
              "error": "#ba1a1a",
              "on-primary-container": "#7c839b",
              "tertiary-container": "#191c1e",
              "tertiary-fixed-dim": "#c4c7c9",
              "on-secondary-fixed": "#001a42",
              "error-container": "#ffdad6",
              "secondary-container": "#2170e4",
              "secondary-fixed-dim": "#adc6ff",
              "surface-bright": "#f8f9ff",
              "on-tertiary-fixed-variant": "#444749",
              "on-primary-fixed": "#131b2e",
              "primary-fixed": "#dae2fd",
              "primary-fixed-dim": "#bec6e0",
              "surface-container-highest": "#d5e3fd",
              "on-error": "#ffffff",
              "surface-container": "#e6eeff",
              "on-surface-variant": "#45464d",
              "surface": "#f8f9ff",
              "secondary-fixed": "#d8e2ff",
              "primary": "#000000",
              "inverse-primary": "#bec6e0",
              "outline": "#76777d",
              "on-secondary-fixed-variant": "#004395",
              "inverse-surface": "#233144",
              "on-primary": "#ffffff",
              "surface-tint": "#565e74",
              "surface-variant": "#d5e3fd",
              "on-tertiary-container": "#818486",
              "secondary": "#0058be",
              "surface-container-high": "#dde9ff",
              "background": "#f8f9ff",
              "on-background": "#0d1c2f",
              "tertiary-fixed": "#e0e3e5",
              "on-secondary-container": "#fefcff",
              "inverse-on-surface": "#ebf1ff",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff",
              "tertiary": "#000000",
              "on-primary-fixed-variant": "#3f465c"
            },
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "spacing": {
              "grid-gutter": "20px",
              "sidebar-width": "260px",
              "stack-gap": "24px",
              "container-padding": "32px",
              "base-unit": "4px"
            },
            "fontFamily": {
              "headline-md": ["Hanken Grotesk"],
              "label-sm": ["Inter"],
              "headline-lg": ["Hanken Grotesk"],
              "body-lg": ["Inter"],
              "label-md": ["Inter"],
              "title-lg": ["Inter"],
              "display-lg": ["Hanken Grotesk"],
              "body-md": ["Inter"],
              "brand": ["Bricolage Grotesque"]
            },
            "fontSize": {
              "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
              "label-sm": ["11px", { "lineHeight": "14px", "letterSpacing": "0.03em", "fontWeight": "600" }],
              "headline-lg": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
              "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
              "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
              "title-lg": ["18px", { "lineHeight": "26px", "fontWeight": "600" }],
              "display-lg": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
              "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .shadow-soft {
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      }
      body {
        background-color: #f8fafc;
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="bg-background font-body-md text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
